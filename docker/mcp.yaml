# MCP server configuration for Hermes Agent — deployment-managed, not user-edited.
# Env vars are substituted from the container environment at startup via apply_mcp.py.
# To add a server: add its config here and add its credential as a Coolify runtime env var.

mcp_servers:
  github:
    command: npx
    args: ["-y", "@modelcontextprotocol/server-github"]
    env:
      GITHUB_PERSONAL_ACCESS_TOKEN: "${GITHUB_PERSONAL_ACCESS_TOKEN}"

  linear:
    command: npx
    args: ["-y", "@linear/mcp-server"]
    env:
      LINEAR_API_KEY: "${LINEAR_API_KEY}"

  workspace:
    command: uvx
    args: ["workspace-mcp", "--tool-tier", "core"]
    env:
      GOOGLE_OAUTH_CLIENT_ID: "${GOOGLE_OAUTH_CLIENT_ID}"
      GOOGLE_OAUTH_CLIENT_SECRET: "${GOOGLE_OAUTH_CLIENT_SECRET}"
      WORKSPACE_MCP_CREDENTIALS_DIR: "/opt/data/workspace_mcp_creds"
      WORKSPACE_MCP_PORT: "8100"
